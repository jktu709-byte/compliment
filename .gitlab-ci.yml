stages:
  - build
  - test
  - secret-detection
  - deploy
build - job:
  stage: build
  image: docker:27
  script:
    - docker build -t 
  rules: 
    - main
test - job:
  stage: test 
  image: python:3.12-slim
  script:
    - ...
  rules: 
    - main
deploy - job:
  stage: deploy
  script:
    - docker compose up -d
  rules:
    - main
secret_detection:
  stage: secret-detection

# version: '3.9'
services:
  db:
    image: postgres:18
    restart: always
    container_name: compliment_base
    # Если база упадет, перезапуск
    healthcheck: 
      test: ["CMD-SHELL", "pg_isready -U compliment_user"]
      interval: 3s
      retries: 5

    # Сборка 
    env_file:
      - src/core/DB.env
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - 5432:5432
      
  app:
    build: 
      context: C:\DEV\nothing\Compliment_app\
      dockerfile: Dockerfile 
    ports:
      - 8000:8000
    container_name: compliment
    env_file:
      - C:\DEV\nothing\Compliment_app\docker.env
    depends_on:
      db:
        condition: service_healthy
      
volumes:
  postgres_data:
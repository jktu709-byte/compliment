# version: '3.9'
services:
  db:
    image: postgres:18
    restart: always
    container_name: compliment_base
    # Сборка 
    build:
      # Где искать Docker-образ
      context: ..
    env_file:
      - src/core/DB.env
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - 5432:5432
  app:
    build: 
      context: ..
      dockerfile: Dockerfile
    
    ports:
      - 8000:8000
    container_name: compliment
    env_file:
      - docker.env
    depends_on:
      - db
volumes:
  postgres_data: